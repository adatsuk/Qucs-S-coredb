name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-qucs-s-rocky8:
    name: qucs-s + CORE (Rocky Linux 8)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: rockylinux:8

    steps:
      - name: Checkout Qucs-S-coredb
        uses: actions/checkout@v4
        with:
          path: Qucs-S-coredb

      - name: Checkout CommonDB
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: CommonDB
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: bash Qucs-S-coredb/scripts/ci-rocky8-deps.sh

      - name: Cache Cap'n Proto (Linux)
        uses: actions/cache@v4
        with:
          path: CommonDB/third_party/capnp-install-linux
          key: capnp-linux-rocky8-v1-${{ hashFiles('CommonDB/scripts/build_capnp_linux.sh') }}
          restore-keys: |
            capnp-linux-rocky8-v1-

      - name: Bootstrap Cap'n Proto
        env:
          COMMONDB_ROOT: ${{ github.workspace }}/CommonDB
        run: |
          sed -i 's/\r$//' "$COMMONDB_ROOT/scripts/build_capnp_linux.sh"
          CAPNP_SKIP_CHECK=1 bash "$COMMONDB_ROOT/scripts/build_capnp_linux.sh" \
            "https://github.com/capnproto/capnproto.git" branch master "" "" \
            "$COMMONDB_ROOT/third_party/capnproto-linux" \
            "$COMMONDB_ROOT/third_party/capnp-install-linux"

      - name: Configure and build qucs-s
        env:
          COMMONDB_ROOT: ${{ github.workspace }}/CommonDB
        run: |
          cmake -S Qucs-S-coredb -B Qucs-S-coredb/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/Qucs-S-coredb/dist-install" \
            -DQUCS_CORE_SOURCE_DIR="$COMMONDB_ROOT" \
            -DCAPNP_ROOT="$COMMONDB_ROOT/third_party/capnp-install-linux"
          cmake --build Qucs-S-coredb/build --target qucs-s translations -j"$(nproc)"

      - name: Install qucs-s payload
        run: |
          BUILD="Qucs-S-coredb/build"
          # Install only qucs-s + CORE (skip satellite GUI tools not built in CI).
          cmake --install "$BUILD/_deps/commondb-build"
          cmake --install "$BUILD/qucs"
          cmake --install "$BUILD/library"
          cmake --install "$BUILD/translations"

      - name: Verify binary
        run: test -x Qucs-S-coredb/dist-install/bin/qucs-s

      - name: Install linuxdeployqt
        run: bash Qucs-S-coredb/scripts/ci_install_linuxdeployqt.sh

      - name: Package portable bundle
        env:
          QT_DIR: /opt/qt/6.5.3/gcc_64
          CAPNP_ROOT: ${{ github.workspace }}/CommonDB/third_party/capnp-install-linux
        run: |
          sed -i 's/\r$//' Qucs-S-coredb/scripts/package_qucs_linux_bundle.sh
          bash Qucs-S-coredb/scripts/package_qucs_linux_bundle.sh \
            Qucs-S-coredb/dist-install \
            Qucs-S-coredb/qucs-s-rocky8-bundle.tar.gz \
            "Rocky Linux 8"

      - name: Upload qucs-s bundle
        uses: actions/upload-artifact@v4
        with:
          name: qucs-s-rocky8
          path: Qucs-S-coredb/qucs-s-rocky8-bundle.tar.gz
